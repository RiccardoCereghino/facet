name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # The suite makes real git commits (reap-blocker tests); a fresh runner has no
    # git identity, so supply one for all platforms.
    env:
      GIT_AUTHOR_NAME: facet CI
      GIT_AUTHOR_EMAIL: ci@facet.invalid
      GIT_COMMITTER_NAME: facet CI
      GIT_COMMITTER_EMAIL: ci@facet.invalid
      # The organisation-name guard (internal/privacy) must not carry an
      # employer's internal names in this public repo, so its word list is
      # supplied out-of-band as a secret rather than committed. With the secret
      # set, the guard runs; unset, the guard fails in CI (CI=true) rather than
      # passing green having checked nothing. Define it under repo Settings ->
      # Secrets and variables -> Actions as a comma-separated list.
      FACET_DENYLIST: ${{ secrets.FACET_DENYLIST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: gofmt
        if: matrix.os != 'windows-latest'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "these files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
